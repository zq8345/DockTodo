<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DockTodo Local</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app" aria-label="DockTodo Local">
      <aside class="rail" aria-label="主导航">
        <div class="brand" title="DockTodo">D</div>
        <button class="rail-btn active" type="button" data-view="write" title="写作">✎</button>
        <button class="rail-btn" type="button" data-view="library" title="笔记库">☰</button>
        <button class="rail-btn" type="button" data-view="network" title="知识网络">◎</button>
        <button class="rail-btn" type="button" data-view="review" title="知识回流">↺</button>
        <button class="rail-btn bottom" type="button" id="themeToggle" title="切换主题">◐</button>
      </aside>

      <aside class="sidebar" aria-label="笔记库">
        <header class="sidebar-head">
          <div>
            <p>DockTodo Local</p>
            <h1>本地知识网络</h1>
          </div>
          <button class="icon-btn" id="newNote" type="button" title="新建笔记">+</button>
        </header>

        <div class="search-box">
          <input id="searchInput" type="search" placeholder="搜索笔记、标签或想法" autocomplete="off" />
        </div>

        <nav class="nav-list" aria-label="筛选">
          <button class="nav-item active" type="button" data-filter="all">
            <span>◇</span><span>全部笔记</span><span class="nav-count" id="countAll">0</span>
          </button>
          <button class="nav-item" type="button" data-filter="daily">
            <span>☀</span><span>每日笔记</span><span class="nav-count" id="countDaily">0</span>
          </button>
          <button class="nav-item" type="button" data-filter="pinned">
            <span>★</span><span>置顶</span><span class="nav-count" id="countPinned">0</span>
          </button>
          <button class="nav-item" type="button" data-filter="unlinked">
            <span>○</span><span>待连接</span><span class="nav-count" id="countUnlinked">0</span>
          </button>
        </nav>

        <section class="side-section">
          <div class="section-title">
            <span>主题</span>
            <button class="plain-btn" id="dailyNote" type="button">今天</button>
          </div>
          <div class="tag-list" id="tagList"></div>
        </section>

        <section class="side-section grow">
          <div class="section-title">
            <span>最近笔记</span>
            <button class="plain-btn" id="clearSearch" type="button">清空</button>
          </div>
          <div class="note-list" id="noteList"></div>
        </section>
      </aside>

      <section class="main-pane" aria-label="编辑区">
        <header class="pane-head">
          <div>
            <p id="viewMeta">像 Apple Notes 一样简单，像 Obsidian 一样长期属于你</p>
            <h2 id="viewTitle">写作</h2>
          </div>
          <div class="head-actions">
            <button class="soft-btn" id="insertLink" type="button">插入链接</button>
            <button class="soft-btn" id="exportNote" type="button">导出当前</button>
            <button class="soft-btn" id="exportAll" type="button">导出全部</button>
            <button class="primary-btn" id="smartOrganize" type="button">自动整理</button>
          </div>
        </header>

        <section class="write-view" id="writeView">
          <div class="editor-shell">
            <input id="noteTitle" class="title-input" type="text" maxlength="120" placeholder="给这个想法起个名字" />
            <div class="note-meta" id="noteMeta"></div>
            <textarea id="noteBody" class="note-editor" placeholder="直接写。可以用 #标签，也可以输入 [[另一条笔记]] 建立连接。"></textarea>
          </div>
        </section>

        <section class="library-view hidden" id="libraryView">
          <div class="library-grid" id="libraryGrid"></div>
        </section>

        <section class="network-view hidden" id="networkView">
          <div class="network-grid">
            <section class="network-card wide">
              <div class="section-title flat"><span>主题簇</span></div>
              <div class="cluster-board" id="clusterBoard"></div>
            </section>
            <section class="network-card">
              <div class="section-title flat"><span>强连接</span></div>
              <div class="connection-list" id="strongConnections"></div>
            </section>
            <section class="network-card">
              <div class="section-title flat"><span>孤立想法</span></div>
              <div class="connection-list" id="orphanNotes"></div>
            </section>
          </div>
        </section>

        <section class="review-view hidden" id="reviewView">
          <div class="review-grid">
            <section class="review-card hero-review" id="memoryCard"></section>
            <section class="review-card">
              <div class="section-title flat"><span>最近反复出现的主题</span></div>
              <div id="themeReview" class="theme-review"></div>
            </section>
            <section class="review-card">
              <div class="section-title flat"><span>建议你补上的连接</span></div>
              <div id="connectionReview" class="connection-list"></div>
            </section>
          </div>
        </section>
      </section>

      <aside class="insight-pane" aria-label="相关信息">
        <section class="insight-card ownership">
          <span>Local-first</span>
          <strong>你的知识长期属于你</strong>
          <p>当前笔记保存在浏览器本地，可导出 Markdown。先让积累属于用户，再考虑同步、AI 和发布。</p>
        </section>

        <section class="insight-card">
          <div class="section-title flat"><span>相关笔记</span></div>
          <div id="relatedList" class="mini-list"></div>
        </section>

        <section class="insight-card">
          <div class="section-title flat"><span>反向链接</span></div>
          <div id="backlinkList" class="mini-list"></div>
        </section>

        <section class="insight-card">
          <div class="section-title flat"><span>可连接的想法</span></div>
          <div id="suggestionList" class="mini-list"></div>
        </section>
      </aside>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
